<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cambiar contraseña - TEACHEASY</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='modulo_adm.css') }}">

    <!-- Font Awesome para los ojos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Inter', sans-serif;
        }

        .contenedor {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }

        .card h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        .input-group input:focus {
            border-color: #4CAF50;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 38px;
            cursor: pointer;
            color: #666;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #45a049;
        }

        .mensaje {
            margin-bottom: 15px;
            font-size: 14px;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }

        .logo {
            width: 80px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="contenedor">

    <div class="card">

        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

        <h2>🔐 Cambiar contraseña</h2>

        <!-- Mensajes -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mensaje {{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <!-- Nueva contraseña -->
            <div class="input-group password-wrapper">
                <label>Nueva contraseña</label>
                <input type="password" id="nueva" name="nueva" required>
                <i class="fas fa-eye toggle-password" id="toggleNueva"></i>
            </div>

            <!-- Confirmar contraseña -->
            <div class="input-group password-wrapper">
                <label>Confirmar contraseña</label>
                <input type="password" id="confirmar" name="confirmar" required>
                <i class="fas fa-eye toggle-password" id="toggleConfirmar"></i>
            </div>

            <button type="submit" class="btn">
                Actualizar contraseña
            </button>

        </form>

    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    function setupToggle(toggleId, inputId) {
        const toggle = document.getElementById(toggleId);
        const input = document.getElementById(inputId);

        toggle.addEventListener('click', () => {
            input.type = input.type === 'password' ? 'text' : 'password';
            toggle.classList.toggle('fa-eye');
            toggle.classList.toggle('fa-eye-slash');
        });
    }

    setupToggle('toggleNueva', 'nueva');
    setupToggle('toggleConfirmar', 'confirmar');

});
</script>

</body>
</html>
