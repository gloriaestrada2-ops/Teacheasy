<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de contenido</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='gestionar_contenido.css') }}">
</head>
<body>

    <!-- Barra superior -->
    <div class="barra-superior">
        <div class="barra-contenido">
            <span class="panel-texto">Gestión de Contenido</span>
            <a href="{{ url_for('modulo_administracion') }}" class="volver">
                ← Volver al módulo
            </a>
        </div>
    </div>

    <div class="contenido-principal">

        <!-- Botón agregar -->
        <a href="{{ url_for('agregar_recurso', id_tipo=id_tipo) }}" 
           class="btn-gestionar-principal">
           ➕ Agregar Nuevo Recurso
        </a>

        <table class="tabla-recursos">
            <thead>
                <tr>
                    <th>Unidad</th>
                    <th>Título</th>
                    <th>Descripción</th>
                    <th>URL</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for r in recursos %}
                <tr>
                    <td>{{ r.id_unidad }}</td>
                    <td>{{ r.titulo }}</td>
                    <td>{{ r.descripcion }}</td>
                    <td>
                        <a href="{{ r.url }}" target="_blank" class="ver-recurso">
                            Ver
                        </a>
                    </td>
                    <td class="acciones">
                        <a href="{{ url_for('editar_recurso', id_recurso=r.id_recurso) }}"class="btn-editar">Editar</a>
                 

                        <!-- BOTÓN ELIMINAR CORREGIDO -->
                        <a href="#"
                           class="btn-eliminar"
                           onclick="abrirModal({{ r.id_recurso }}, {{ id_tipo }})">
                           Eliminar
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

    <!-- ================= MODAL ELIMINAR RECURSO ================= -->
    <div id="modalEliminar" class="modal-overlay" style="display:none;">
        <div class="modal-box">

            <div class="modal-icono">
                ⚠
            </div>

            <h3>¿Desea eliminar este recurso?</h3>

            <div class="modal-botones">
                <button class="btn-cancelar" onclick="cerrarModal()">
                    No
                </button>

                <a id="btnConfirmarEliminar" href="#" class="btn-confirmar">
                    Sí, eliminar
                </a>
            </div>

        </div>
    </div>

    <!-- ================= SCRIPT MODAL ================= -->
    <script>
        function abrirModal(idRecurso, idTipo) {
            const modal = document.getElementById("modalEliminar");
            const btnConfirmar = document.getElementById("btnConfirmarEliminar");

            // Construir URL dinámica con id_recurso e id_tipo
            btnConfirmar.href = "/eliminar_recurso/" + idRecurso + "/" + idTipo;

            modal.style.display = "flex";
        }

        function cerrarModal() {
            document.getElementById("modalEliminar").style.display = "none";
        }
    </script>

</body>
</html>
